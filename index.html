<!DOCTYPE html>
<html lang="zh-CN">
<head>

</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fa-brands fa-markdown"></i>
                <h1>Tomorrow Markdown Editor for Typace</h1>
                <span class="version">v1.2</span>
            </div>
            <div class="controls">
                <div class="theme-toggle">
                    <button id="themeToggle" class="btn-icon" type="button">
                        <i class="fas fa-moon"></i>
                        <span>暗色模式</span>
                    </button>
                </div>
                <div class="word-count">
                    <i class="fas fa-file-word"></i>
                    <span id="wordCount">0</span> 字
                </div>
            </div>
        </header>

        <div class="toolbar">
            <div class="toolbar-group">
                <button class="toolbar-btn" data-insert="# " type="button" data-tippy-content="标题 (H1)">
                    <i class="fas fa-heading"></i>
                </button>
                <button class="toolbar-btn" data-insert="## " type="button" data-tippy-content="二级标题 (H2)">
                    <i class="fas fa-heading" style="font-size: 0.9em;"></i>
                </button>
                <button class="toolbar-btn" data-insert="### " type="button" data-tippy-content="三级标题 (H3)">
                    <i class="fas fa-heading" style="font-size: 0.8em;"></i>
                </button>
                <button class="toolbar-btn" data-insert="**text**" type="button" data-tippy-content="粗体">
                    <i class="fas fa-bold"></i>
                </button>
            </div>
            <div class="toolbar-group">
                <button class="toolbar-btn" data-insert="*text*" type="button" data-tippy-content="斜体">
                    <i class="fas fa-italic"></i>
                </button>
                <button class="toolbar-btn" data-insert="~~text~~" type="button" data-tippy-content="删除线">
                    <i class="fas fa-strikethrough"></i>
                </button>
                <button class="toolbar-btn" data-insert="`code`" type="button" data-tippy-content="行内代码">
                    <i class="fas fa-code"></i>
                </button>
                <button class="toolbar-btn" data-insert="```\ncode\n```" type="button" data-tippy-content="代码块">
                    <i class="fas fa-terminal"></i>
                </button>
            </div>
            <div class="toolbar-group">
                <button class="toolbar-btn" data-insert="$公式$" type="button" data-tippy-content="数学公式（居中数学公式请按两次，详见KaTex语法文档）">
                    <i class="fa-solid fa-square-root-variable"></i>
                </button>
            
                <button class="toolbar-btn" data-insert="[链接文本](url)" type="button" data-tippy-content="链接">
                    <i class="fas fa-link"></i>
                </button>
                <button class="toolbar-btn" data-insert="![图片描述](url)" type="button" data-tippy-content="图片">
                    <i class="fas fa-image"></i>
                </button>
            </div>
            <div class="toolbar-group">
                <button class="toolbar-btn" data-insert="- [ ] " type="button" data-tippy-content="待办列表">
                    <i class="fas fa-tasks"></i>
                </button>
                <button class="toolbar-btn" data-insert="1. " type="button" data-tippy-content="有序列表">
                    <i class="fas fa-list-ol"></i>
                </button>
                <button class="toolbar-btn" data-insert="- " type="button" data-tippy-content="无序列表">
                    <i class="fas fa-list-ul"></i>
                </button>
                <button class="toolbar-btn" data-insert="> " type="button" data-tippy-content="引用">
                    <i class="fas fa-quote-right"></i>
                </button>
            </div>
            <div class="toolbar-group">
                <button class="toolbar-btn" data-insert="| 标题 | 标题 |
| --- | --- |
|内容 | 内容 |" type="button" data-tippy-content="表格">
                    <i class="fas fa-table"></i>
                </button>
                <button class="toolbar-btn" data-insert="---" type="button" data-tippy-content="分割线">
                    <i class="fas fa-minus"></i>
                </button>
                <button id="saveBtn" class="toolbar-btn success" type="button" data-tippy-content="保存到本地">
                    <i class="fas fa-save"></i>
                </button>
                <button id="clearBtn" class="toolbar-btn danger" type="button" data-tippy-content="清空内容">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>

        <div class="editor-container">
            <div class="editor-section">
                <div class="section-header">
                    <h2><i class="fas fa-edit"></i> 编辑区</h2>
                    <button id="copyBtn" class="btn-sm" type="button">
                        <i class="fas fa-copy"></i> 复制
                    </button>
                </div>
                <textarea id="editor" class="editor" placeholder="# 开始编写 Markdown...
## 支持的功能：
- **数学公式**：使用 $E=mc^2$ 
- **代码高亮**
- **表格、列表、引用**
- 内容自动保存到浏览器本地存储"># Tomorrow Markdown 编辑器

## ✨ 新特性

### 1. 数学公式支持

#### 行内公式
质能方程：$E = mc^2$
速度位移：$\Delta{x}=V_0t+\frac{1}{2}at^2$
勾股定理：$a^2 + b^2 = c^2$
                    
#### 行间居中公式
向量
$$\overrightarrow{AB}+\overrightarrow{BC}=\overrightarrow{AC}$$
二次函数
$$y=ax^2+bx+c$$
                    

### 2. 代码高亮示例

```python
import numpy as np

def calculate_mean(numbers):
    """计算平均值"""
    return np.mean(numbers)

# 使用示例
data = [1, 2, 3, 4, 5]
print(f"平均值: {calculate_mean(data)}")
```


### 3. 其他功能

| 功能 | 状态 | 说明 |
|------|------|------|
| 数学公式 | ✅ | 支持 LaTeX 语法 |
| 代码高亮 | ✅ | 多种语言支持 |
| 暗色模式 | ✅ | 保护眼睛 |
| 本地保存 | ✅ | 自动保存 |
| 实时预览 | ✅ | 即时渲染 |

> 💡 **提示**：将鼠标悬停在工具栏按钮上查看功能说明
> 
> 📝 **数学公式**：使用 `$公式$` 表示行内公式，`$$公式$$` 表示块级公式

**开始你的创作吧！**</textarea>
